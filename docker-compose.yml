version: '3.8'

services:
  python-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./starc.duckdb:/app/starc.duckdb:ro
    restart: unless-stopped

  node-api:
    build:
      context: .
      dockerfile: backend-node.Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./starc.duckdb:/app/starc.duckdb:ro
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        - VITE_API_URL=http://localhost:5001
        - VITE_CATALOG_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - node-api
      - python-api
    restart: unless-stopped
